<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap');

  :root {
    --bg: #0a0a12;
    --accent: #00ffe7;
    --danger: #ff3c5f;
    --warn: #ffcc00;
    --exit: #39ff14;
    --text: #e0e0ff;
    --panel: #151525;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Orbitron', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    overflow-y: auto;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: 5px;
  }

  /* ===== AD STYLES ===== */
  .top-ad-container {
    width: 470px;
    max-width: 100%;
    text-align: center;
    margin-bottom: 8px;
    background: rgba(20,20,35,0.9);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 5px;
    min-height: 70px;
  }
  .ad-label {
    font-size: 6px;
    color: var(--accent);
    background: rgba(0,0,0,0.5);
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 3px;
    font-family: 'Press Start 2P', monospace;
  }

  .game-wrapper {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 15px;
    width: 100%;
    max-width: 1000px;
  }

  .ad-sidebar {
    width: 162px;
    min-width: 162px;
    max-width: 162px;
    background: rgba(20,20,35,0.9);
    border-radius: 8px;
    border: 1px solid var(--accent);
    text-align: center;
    padding: 5px 1px;
    position: sticky;
    top: 10px;
    flex-shrink: 0;
    min-height: 310px;
  }

  .mobile-ad {
    display: none;
    width: 322px;
    max-width: 100%;
    margin: 10px auto;
    background: rgba(20,20,35,0.9);
    border-radius: 8px;
    border: 1px solid var(--accent);
    text-align: center;
    padding: 5px;
    min-height: 60px;
  }

  @media (max-width: 900px) {
    .ad-sidebar { display: none; }
    .sidebar-spacer { display: none !important; }
  }
  @media (max-width: 600px) {
    .mobile-ad { display: block; }
    .top-ad-container { width: 322px; }
  }

  #game-container {
    position: relative;
    width: 100%;
    max-width: 608px;
    background: var(--panel);
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid var(--accent);
    box-shadow: 0 0 30px rgba(0,255,231,0.2);
  }

  #hud {
    position: relative;
    z-index: 10;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 55px;
    background: rgba(10,10,18,0.95);
    border-bottom: 2px solid var(--accent);
  }
  .hud-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent);
  }
  #title-bar {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--warn);
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.4;
  }

  #settings-btn, #pause-btn, #home-btn {
    position: absolute;
    top: 10px;
    width: 40px;
    height: 40px;
    background: var(--panel);
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 10px rgba(0,255,231,0.3);
    z-index: 100;
  }
  #settings-btn { right: 10px; }
  #pause-btn { right: 10px; display: none; }
  #home-btn { left: 10px; display: none; }
  #settings-btn:hover, #pause-btn:hover, #home-btn:hover {
    transform: scale(1.1);
    background: var(--accent);
  }
  #settings-btn:hover svg, #pause-btn:hover svg, #home-btn:hover svg { fill: #0a0a12; }
  #settings-btn svg, #pause-btn svg, #home-btn svg {
    width: 22px;
    height: 22px;
    fill: var(--accent);
    transition: fill 0.2s;
  }

  #invert-banner {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: rgba(0,255,231,0.1);
    border-bottom: 1px solid var(--accent);
  }
  #invert-banner.inverted {
    background: rgba(255,60,95,0.2);
    color: var(--danger);
    border-bottom-color: var(--danger);
  }
  #timer-bar-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.1);
  }
  #timer-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.1s linear;
    width: 0%;
  }

  #canvas-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    background: #0d0d1c;
  }
  canvas {
    display: block;
    image-rendering: crisp-edges;
    width: 100%;
    height: auto;
    touch-action: none;
  }

  #stats {
    position: absolute;
    top: 5px;
    right: 5px;
    font-size: 7px;
    color: var(--warn);
    font-family: 'Press Start 2P', monospace;
    z-index: 20;
    background: rgba(0,0,0,0.7);
    padding: 3px 6px;
    border-radius: 3px;
  }
  #timer-warning {
    position: absolute;
    top: 5px;
    left: 5px;
    font-size: 7px;
    color: var(--danger);
    font-family: 'Press Start 2P', monospace;
    z-index: 20;
    display: none;
    background: rgba(0,0,0,0.7);
    padding: 3px 6px;
    border-radius: 3px;
  }

  .game-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 50;
    background: rgba(10,10,18,0.95);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .game-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }
  .overlay-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    text-align: center;
    line-height: 1.4;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent);
  }
  .overlay-sub {
    font-size: 9px;
    color: var(--text);
    text-align: center;
    line-height: 1.6;
  }

    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 12px 24px;
    border: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 5px;
  }
  .btn:hover {
    background: var(--accent);
    color: #0a0a12;
    transform: scale(1.05);
  }

  #mobile-controls {
    position: relative;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px;
    background: rgba(10,10,18,0.8);
  }
  @media (max-width: 700px) {
    #mobile-controls { display: flex; }
  }
  .dpad-row {
    display: flex;
    gap: 5px;
  }
  .dpad-btn {
    width: 58px;
    height: 58px;
    background: rgba(0,255,231,0.15);
    border: 2px solid var(--accent);
    color: var(--accent);
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    touch-action: manipulation;
  }
  .dpad-btn:active {
    background: var(--accent);
    color: #0a0a12;
  }

  #settings-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    width: 300px;
    background: var(--panel);
    border: 3px solid var(--accent);
    border-radius: 10px;
    padding: 20px;
    z-index: 600;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    box-shadow: 0 0 30px rgba(0,255,231,0.3);
  }
  #settings-panel.visible {
    opacity: 1;
    pointer-events: all;
    transform: translate(-50%, -50%) scale(1);
  }
  .settings-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 20px;
  }
  .settings-option { margin-bottom: 20px; }
  .settings-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--text);
    margin-bottom: 10px;
    display: block;
  }
  .difficulty-buttons, .graphics-buttons {
    display: flex;
    gap: 6px;
  }
  .difficulty-btn, .graphics-btn {
    flex: 1;
    padding: 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    border: 2px solid;
    background: transparent;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 5px;
  }
  .difficulty-btn[data-difficulty="easy"] { border-color: #39ff14; color: #39ff14; }
  .difficulty-btn[data-difficulty="easy"].active { background: #39ff14; color: #0a0a12; }
  .difficulty-btn[data-difficulty="normal"] { border-color: #ffcc00; color: #ffcc00; }
  .difficulty-btn[data-difficulty="normal"].active { background: #ffcc00; color: #0a0a12; }
  .difficulty-btn[data-difficulty="hard"] { border-color: #ff3c5f; color: #ff3c5f; }
  .difficulty-btn[data-difficulty="hard"].active { background: #ff3c5f; color: #0a0a12; }
  .graphics-btn { border-color: var(--accent); color: var(--accent); }
  .graphics-btn.active { background: var(--accent); color: #0a0a12; }
  .close-btn {
    width: 100%;
    padding: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: var(--danger);
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 10px;
  }

  #pause-menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    width: 260px;
    background: var(--panel);
    border: 3px solid var(--accent);
    border-radius: 10px;
    padding: 20px;
    z-index: 550;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    box-shadow: 0 0 30px rgba(0,255,231,0.3);
    text-align: center;
  }
  #pause-menu.visible {
    opacity: 1;
    pointer-events: all;
    transform: translate(-50%, -50%) scale(1);
  }
  .pause-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 20px;
  }
  .pause-btn {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    border: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 5px;
  }
  .pause-btn:hover { background: var(--accent); color: #0a0a12; }
  .pause-btn.exit { border-color: var(--danger); color: var(--danger); }
  .pause-btn.exit:hover { background: var(--danger); color: white; }
</style>
</head>

<script>
// ===== AUDIO =====
let audioCtx = null, audioOn = false;
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function resumeAudio() {
  if (audioCtx?.state === 'suspended') audioCtx.resume().then(() => audioOn = true);
  else if (audioCtx?.state === 'running') audioOn = true;
}
function playTone(t,f,d,v) {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = t; o.frequency.value = f; g.gain.value = v;
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + d);
}
function playDeath() { if(audioOn){playTone('sawtooth',300,0.2,0.3);setTimeout(()=>playTone('sawtooth',200,0.3,0.3),100);}}
function playWin() { if(audioOn){playTone('sine',600,0.15,0.3);setTimeout(()=>playTone('sine',800,0.2,0.3),150);}}
function playInvert() { if(audioOn){playTone('triangle',400,0.05,0.2);playTone('triangle',600,0.05,0.2);}}
function playStart() { if(audioOn){playTone('sine',500,0.1,0.2);setTimeout(()=>playTone('sine',700,0.15,0.2),100);}}
function playClick() { if(audioOn) playTone('sine',300,0.03,0.1); }

document.addEventListener('click', function o(){initAudio();resumeAudio();document.removeEventListener('click',o);});
document.addEventListener('keydown', function o(){initAudio();resumeAudio();document.removeEventListener('keydown',o);});

// ===== CONSTANTS =====
const TILE = 32, COLS = 19, ROWS = 15;
const CW = COLS * TILE, CH = ROWS * TILE;
const T_EMPTY = 0, T_WALL = 1, T_TRAP = 2, T_EXIT = 3, T_SPAWN = 4;

// ===== STATE =====
let inverted = false, invertTimer = 0, invertInt = 5000;
let lvlTimer = 0, lvlTimeLimit = 0, score = 0, highScore = 0;
let curLvl = 0, lastLvl = 0, state = 'start', lastT = 0, shake = 0;
let keys = {}, mobDir = null, player = {x:0, y:0, w:26, h:26}, speed = 4, lvlDone = false;
let diff = 'normal', gfx = 'high';

try {
  const sd = localStorage.getItem('difficulty');
  if (['easy','normal','hard'].includes(sd)) diff = sd;
  const sg = localStorage.getItem('graphicsQuality');
  if (['high','lite'].includes(sg)) gfx = sg;
} catch(e) {}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CW;
canvas.height = CH;

// ===== DOM =====
const scoreD = document.getElementById('score-display');
const levelD = document.getElementById('level-display');
const invertB = document.getElementById('invert-banner');
const invertT = document.getElementById('invert-text');
const timerB = document.getElementById('timer-bar');
const statsD = document.getElementById('stats');
const timerW = document.getElementById('timer-warning');
const settingsB = document.getElementById('settings-btn');
const pauseB = document.getElementById('pause-btn');
const homeB = document.getElementById('home-btn');
const settingsP = document.getElementById('settings-panel');
const pauseM = document.getElementById('pause-menu');
const deathS = document.getElementById('death-sub');
const overlays = {start:document.getElementById('start-overlay'),dead:document.getElementById('death-overlay'),complete:document.getElementById('complete-overlay'),gameover:document.getElementById('gameover-overlay')};

const diffBtns = document.querySelectorAll('.difficulty-btn');
const gfxBtns = document.querySelectorAll('.graphics-btn');
function updateUI(){diffBtns.forEach(b=>b.classList.toggle('active',b.dataset.difficulty===diff));gfxBtns.forEach(b=>b.classList.toggle('active',b.dataset.graphics===gfx));}
updateUI();

settingsB.onclick=()=>{playClick();if(state==='start')settingsP.classList.add('visible');};
document.getElementById('close-settings').onclick=()=>{playClick();settingsP.classList.remove('visible');};
diffBtns.forEach(b=>b.onclick=()=>{playClick();diff=b.dataset.difficulty;localStorage.setItem('difficulty',diff);updateUI();});
gfxBtns.forEach(b=>b.onclick=()=>{playClick();gfx=b.dataset.graphics;localStorage.setItem('graphicsQuality',gfx);updateUI();});
pauseB.onclick=()=>{playClick();if(state==='playing'){state='paused';pauseM.classList.add('visible');}};
homeB.onclick=()=>{playClick();toStart();};
document.getElementById('resume-btn').onclick=()=>{playClick();state='playing';pauseM.classList.remove('visible');};
document.getElementById('exit-btn').onclick=()=>{playClick();toStart();};
document.getElementById('death-home-btn').onclick=()=>{playClick();toStart();};
document.getElementById('complete-home-btn').onclick=()=>{playClick();toStart();};
document.getElementById('gameover-home-btn').onclick=()=>{playClick();toStart();};
document.getElementById('gameover-restart-btn').onclick=()=>{playClick();fullStart();};
document.getElementById('start-btn').onclick=()=>{playClick();fullStart();};
document.getElementById('retry-btn').onclick=()=>{playClick();restart();};
document.getElementById('next-btn').onclick=()=>{playClick();nextLvl();};

document.addEventListener('click',e=>{if(state==='paused'&&!pauseM.contains(e.target)&&!pauseB.contains(e.target)){state='playing';pauseM.classList.remove('visible');}if(settingsP.classList.contains('visible')&&!settingsP.contains(e.target)&&!settingsB.contains(e.target))settingsP.classList.remove('visible');});

function toStart(){state='start';pauseM.classList.remove('visible');settingsP.classList.remove('visible');pauseB.style.display='none';homeB.style.display='none';settingsB.style.display='flex';show('start');lvlDone=false;}

function getDiff(l){if(diff==='easy')return{iBase:5000,iDec:150,sBase:4,sInc:0.15,tLimit:0,tStart:999};if(diff==='normal')return{iBase:4500,iDec:180,sBase:4.2,sInc:0.18,tLimit:30+l*5,tStart:5};return{iBase:3500,iDec:220,sBase:4.5,sInc:0.22,tLimit:20+l*3,tStart:1};}
function resetTimers(){const s=getDiff(curLvl);invertInt=Math.max(2500,s.iBase-curLvl*s.iDec);invertTimer=invertInt;speed=s.sBase+curLvl*s.sInc;if(curLvl+1>=s.tStart){if(!lvlTimeLimit){lvlTimeLimit=s.tLimit;lvlTimer=lvlTimeLimit;}timerW.style.display='block';}else{lvlTimeLimit=0;lvlTimer=0;timerW.style.display='none';}updateStats();}
function updateStats(){statsD.innerHTML=`⚡${speed.toFixed(1)} 🔄${Math.round(invertInt/1000)}s${lvlTimeLimit?` ⏱${lvlTimer.toFixed(0)}s`:''}`;}
function initPlayer(){const m=LEVELS[curLvl];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(m[r][c]===T_SPAWN){player.x=c*TILE+(TILE-player.w)/2;player.y=r*TILE+(TILE-player.h)/2;return;}player.x=TILE+5;player.y=TILE+5;}
function updateInvert(dt){if(state!=='playing')return;invertTimer=Math.max(0,invertTimer-dt);timerB.style.width=(invertTimer/invertInt*100)+'%';if(invertTimer<=0){inverted=!inverted;invertTimer=invertInt;playInvert();invertB.className=inverted?'inverted':'';invertT.textContent=inverted?'⚠ REVERSED':'▶ NORMAL';shake=8;updateStats();}}
function updateLvlTimer(dt){if(state!=='playing'||!lvlTimeLimit)return;lvlTimer=Math.max(0,lvlTimer-dt/1000);updateStats();if(lvlTimer<=0)die('⏰ TIME OUT!');}
function isSolid(x,y){const m=LEVELS[curLvl],c=Math.floor(x/TILE),r=Math.floor(y/TILE);if(r<0||r>=ROWS||c<0||c>=COLS)return true;return m[r][c]===T_WALL;}
function canMove(x,y){return!isSolid(x,y)&&!isSolid(x+player.w-1,y)&&!isSolid(x,y+player.h-1)&&!isSolid(x+player.w-1,y+player.h-1);}
function getInput(){let dx=0,dy=0;if(keys['ArrowLeft']||mobDir==='left')dx=-1;if(keys['ArrowRight']||mobDir==='right')dx=1;if(keys['ArrowUp']||mobDir==='up')dy=-1;if(keys['ArrowDown']||mobDir==='down')dy=1;if(inverted){dx=-dx;dy=-dy;}return{dx,dy};}
function move(){const{dx,dy}=getInput();if(!dx&&!dy)return;if(dx){const nx=player.x+dx*speed;if(canMove(nx,player.y))player.x=nx;}if(dy){const ny=player.y+dy*speed;if(canMove(player.x,ny))player.y=ny;}player.x=Math.max(0,Math.min(CW-player.w,player.x));player.y=Math.max(0,Math.min(CH-player.h,player.y));}
function checkTrap(){const m=LEVELS[curLvl],cx=Math.floor((player.x+player.w/2)/TILE),cy=Math.floor((player.y+player.h/2)/TILE);return m[cy]&&m[cy][cx]===T_TRAP;}
function checkExit(){const m=LEVELS[curLvl],cx=Math.floor((player.x+player.w/2)/TILE),cy=Math.floor((player.y+player.h/2)/TILE);return m[cy]&&m[cy][cx]===T_EXIT;}
function win(){if(lvlDone)return;lvlDone=true;state='complete';score++;if(score>highScore)highScore=score;lastLvl=curLvl;lvlTimeLimit=0;playWin();updateHUD();document.getElementById('complete-sub').innerHTML=`Score: ${score}<br>Best: ${highScore}`;show('complete');pauseB.style.display='none';homeB.style.display='flex';settingsB.style.display='none';}
function die(msg=''){if(state!=='playing')return;state='dead';playDeath();deathS.textContent=msg||'💀 DIED';if(diff==='hard'){curLvl=0;score=0;lastLvl=0;}else if(diff==='normal'){curLvl=Math.max(0,lastLvl);score=lastLvl;}show('dead');pauseB.style.display='none';homeB.style.display='flex';settingsB.style.display='none';lvlTimeLimit=0;lvlDone=false;updateHUD();}
function restart(){state='playing';inverted=false;invertT.textContent='▶ NORMAL';invertB.className='';lvlTimeLimit=0;lvlDone=false;resetTimers();initPlayer();hideAll();settingsB.style.display='none';pauseB.style.display='flex';homeB.style.display='flex';updateHUD();}
function nextLvl(){if(!lvlDone)return;curLvl++;if(curLvl>=LEVELS.length){document.getElementById('gameover-sub').innerHTML=`Final Score: ${score}<br>Best: ${highScore}`;show('gameover');state='gameover';pauseB.style.display='none';homeB.style.display='flex';settingsB.style.display='none';return;}lvlDone=false;state='playing';inverted=false;invertT.textContent='▶ NORMAL';invertB.className='';lvlTimeLimit=0;resetTimers();initPlayer();updateHUD();hideAll();settingsB.style.display='none';pauseB.style.display='flex';homeB.style.display='flex';}
function fullStart(){score=0;curLvl=0;lastLvl=0;lvlDone=false;state='playing';inverted=false;invertT.textContent='▶ NORMAL';invertB.className='';lvlTimeLimit=0;resetTimers();initPlayer();updateHUD();hideAll();settingsB.style.display='none';pauseB.style.display='flex';homeB.style.display='flex';settingsP.classList.remove('visible');playStart();}
function updateHUD(){scoreD.textContent=score;levelD.textContent=curLvl+1;}
function show(n){hideAll();overlays[n]?.classList.add('visible');}
function hideAll(){Object.values(overlays).forEach(o=>o.classList.remove('visible'));}

function drawMaze(){const m=LEVELS[curLvl];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const t=m[r][c],x=c*TILE,y=r*TILE;if(t===T_WALL){ctx.fillStyle=gfx==='high'?'#1a1a30':'#1e1e3a';ctx.fillRect(x,y,TILE,TILE);if(gfx==='high'){ctx.fillStyle='#2a2a50';ctx.fillRect(x,y,TILE,2);ctx.fillRect(x,y,2,TILE);}}else if(t===T_TRAP){if(gfx==='high'){ctx.beginPath();ctx.moveTo(x+8,y+8);ctx.lineTo(x+24,y+24);ctx.moveTo(x+24,y+8);ctx.lineTo(x+8,y+24);ctx.lineWidth=4;ctx.strokeStyle='#ff3c5f';ctx.stroke();}else{ctx.fillStyle='#ff3c5f';ctx.fillRect(x+8,y+8,16,16);}}else if(t===T_EXIT){ctx.fillStyle='#39ff14';ctx.fillRect(x+6,y+6,20,20);if(gfx==='high'){ctx.fillStyle='#0a0a12';ctx.font='bold 8px monospace';ctx.fillText('EXIT',x+4,y+20);}}else{ctx.fillStyle='#0d0d1c';ctx.fillRect(x,y,TILE,TILE);}}}
function drawPlayer(){if(gfx==='high'){ctx.fillStyle='#fff';ctx.fillRect(player.x,player.y,player.w,player.h);ctx.fillStyle=inverted?'#ff3c5f':'#00ffe7';ctx.fillRect(player.x+6,player.y+6,5,5);ctx.fillRect(player.x+15,player.y+6,5,5);}else{ctx.fillStyle=inverted?'#ff3c5f':'#00ffe7';ctx.fillRect(player.x,player.y,player.w,player.h);}}
function applyShake(){if(shake>0&&gfx==='high'){ctx.translate((Math.random()-0.5)*5,(Math.random()-0.5)*5);shake--;}}
function loop(ts){const dt=Math.min(50,ts-lastT);lastT=ts;ctx.clearRect(0,0,CW,CH);ctx.save();applyShake();drawMaze();if(state==='playing'){updateInvert(dt);updateLvlTimer(dt);move();if(!lvlDone&&checkTrap())die('💀 SPIKE TRAP');else if(!lvlDone&&checkExit())win();}drawPlayer();ctx.restore();requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{if(e.key.startsWith('Arrow')){e.preventDefault();keys[e.key]=true;if(state==='start')fullStart();}if(e.key==='Escape'){if(state==='playing'){state='paused';pauseM.classList.add('visible');}else if(state==='paused'){state='playing';pauseM.classList.remove('visible');}}});
document.addEventListener('keyup',e=>keys[e.key]=false);
document.querySelectorAll('.dpad-btn').forEach(b=>{const d=b.dataset.dir;b.addEventListener('pointerdown',e=>{e.preventDefault();mobDir=d;if(state==='start')fullStart();});b.addEventListener('pointerup',()=>{if(mobDir===d)mobDir=null;});b.addEventListener('pointerleave',()=>{if(mobDir===d)mobDir=null;});});

// Initialize
initPlayer();updateHUD();resetTimers();
settingsB.style.display='flex';pauseB.style.display='none';homeB.style.display='none';
requestAnimationFrame(ts=>{lastT=ts;loop(ts);});

        console.log('❌ Service Worker error:', err);
      });
  });
}
</script>
